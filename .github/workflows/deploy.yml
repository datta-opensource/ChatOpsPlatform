name: Deploy ChatOpsPlatform to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChatOpsPlatform.sln

      - name: Build
        run: dotnet build ChatOpsPlatform.sln --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish SwiftLux.WhatsApp.Api/SwiftLux.WhatsApp.Api.csproj --configuration Release --output ./publish

      - name: Create deployment package
        run: tar -czf release.tar.gz -C ./publish .

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to EC2
        run: |
          scp -P "${{ secrets.EC2_PORT }}" release.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/release.tar.gz"

      - name: Deploy on EC2
        run: |
          ssh -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e

            RELEASE_ID=$(date +%Y%m%d-%H%M%S)
            RELEASE_DIR="/var/chatops/releases/$RELEASE_ID"

            mkdir -p "$RELEASE_DIR"
            tar -xzf /tmp/release.tar.gz -C "$RELEASE_DIR"
            rm -f /tmp/release.tar.gz

            ln -sfn "$RELEASE_DIR" /var/chatops/current

            sudo systemctl restart chatops.service
            sudo systemctl is-active --quiet chatops.service

            echo "Deployment completed successfully: $RELEASE_ID"
          EOF
